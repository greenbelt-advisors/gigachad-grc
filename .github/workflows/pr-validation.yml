name: PR Validation

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

permissions:
  contents: read

jobs:
  # Frontend validation
  frontend:
    name: Frontend Validation
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install all dependencies
        run: npm ci

      - name: Fix rollup optional dep for Linux
        run: npm install @rollup/rollup-linux-x64-gnu --save-optional
        working-directory: frontend
        continue-on-error: true

      - name: TypeScript compilation check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: ESLint validation
        run: npm run lint
        working-directory: frontend

      - name: Run unit tests
        run: npm test -- --run --reporter=verbose
        working-directory: frontend

      - name: Build check
        run: npm run build
        working-directory: frontend

  # Backend services validation
  backend:
    name: Backend Validation
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [controls, frameworks, policies, tprm, trust, audit]

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install all dependencies
        run: npm ci

      - name: Build shared module
        run: npm run build --workspace=@gigachad-grc/shared

      - name: TypeScript compilation check
        run: npx tsc --noEmit
        working-directory: services/${{ matrix.service }}
        continue-on-error: true # Some services have pre-existing type issues

      - name: ESLint validation
        run: npm run lint --if-present
        working-directory: services/${{ matrix.service }}
        continue-on-error: true # Some services have ESLint config issues

      - name: Run unit tests
        run: npm test --if-present
        working-directory: services/${{ matrix.service }}
        continue-on-error: true # Tests may not be fully implemented yet

  # Security scanning - BLOCKING: PRs cannot merge with security issues
  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (BLOCKING)
        run: npm audit --audit-level=high
        # Security check is now blocking - no continue-on-error

      - name: Run Trivy vulnerability scanner (BLOCKING)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '1' # BLOCKING: Fail on HIGH/CRITICAL vulnerabilities
          format: 'table'
          ignore-unfixed: true # Only fail on vulnerabilities with available fixes

  # Docker build check
  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [controls, frameworks, policies, tprm, trust, audit]

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Docker Buildx
        uses: step-security/setup-buildx-action@c60a792b446ef83310733d5cd9d0c8d6870d043f # v3.12.0

      - name: Build Docker image
        uses: step-security/docker-build-push-action@a8c3d08b23f8be6aeed43eb1a14ce6fe51284438 # v6.18.0
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: false
          tags: grc-${{ matrix.service }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
        env:
          DOCKER_BUILDKIT: 1
        continue-on-error: true # Some services have TypeScript build issues

  # Final status check
  status:
    name: Validation Status
    runs-on: ubuntu-latest
    needs: [frontend, backend, security, docker]
    if: always()
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Check all jobs status
        run: |
          if [ "${{ needs.frontend.result }}" == "failure" ] || \
             [ "${{ needs.backend.result }}" == "failure" ] || \
             [ "${{ needs.security.result }}" == "failure" ]; then
            echo "Required checks failed"
            exit 1
          fi
          echo "All required checks passed (frontend, backend, security)"
